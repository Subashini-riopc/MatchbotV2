# =============================================================================
# MatchBot — Global configuration (shared by ALL providers)
#
# This file holds everything the legacy system baked into Python classes:
# the canonical attribute dictionary, standardization maps (gender / suffixes),
# blocking keys, the matcher chain with weights/thresholds, and DQ rules.
#
# Onboarding a new provider does NOT require editing this file — only a new
# file under providers/. Edit here only to change matching behavior globally
# or to add a brand-new canonical attribute (also add it to the domain module).
# =============================================================================

# --- Canonical attribute dictionary -----------------------------------------
# Must match matchbot.domain.canonical exactly (validated on load).
canonical_attributes:
  - { name: first_name,  dtype: string, pii: true }
  - { name: middle_name, dtype: string, pii: true }
  - { name: last_name,   dtype: string, pii: true }
  - { name: birth_date,  dtype: date,   pii: true }
  - { name: ssn,         dtype: string, pii: true }
  - { name: gender,      dtype: string, pii: true }
  - { name: address1,    dtype: string, pii: true }
  - { name: address2,    dtype: string, pii: true }
  - { name: city,        dtype: string, pii: false }
  - { name: state,       dtype: string, pii: false }
  - { name: zip,         dtype: string, pii: false }
  - { name: member_external_id, dtype: string, pii: true }  # e.g. RIDE SASID

# --- Standardization (was hardcoded in legacy first_pass / derived_identifiers)
standardization:
  gender_map:
    F: FEMALE
    FEMALE: FEMALE
    M: MALE
    MALE: MALE
    NB: NONBINARY
    "X": NONBINARY
  name_suffixes: [JR, SR, II, III, IV, V, VI, ESQ]
  name_prefixes: [MR, MRS, MS, DR]

# --- Matching ----------------------------------------------------------------
matching:
  # Blocking keys cheaply narrow candidate members before scoring.
  blocking_keys:
    - name: external_id_exact
      attributes: [member_external_id]
    - name: ssn_exact
      attributes: [ssn]
    - name: lastname_dob
      attributes: [last_name, birth_date]
      phonetic: [last_name]
    - name: firstname_lastname_dob
      attributes: [first_name, last_name, birth_date]
      phonetic: [first_name, last_name]
    - name: firstname_lastname
      attributes: [first_name, last_name]
      phonetic: [first_name, last_name]

    # Broad phonetic net on last name alone — ensures candidates are found
    # for name-only providers (e.g. RIDE) even when first name differs.
    - name: last_name_only
      attributes: [last_name]
      phonetic: [last_name]

  # Ordered, all-exact-match cascade. First matcher to ACCEPT wins. Each
  # matcher independently requires every one of its `keys` to be present and
  # non-blank on the record — a record missing a rule's required field(s), or
  # for which the rule finds no exact-equal candidate, falls through to the
  # next rule in this list. No fuzzy matching, no confidence scoring: every
  # match here is either an exact-equality accept (score 1.0) or nothing.
  #
  # A provider whose file structurally never has a given field (e.g. RIDE has
  # no birth_date column at all) still lists this same global chain — no
  # provider-level override needed. That rule's key lookup returns None for
  # every record, so it's a fast, harmless skip for that provider's data,
  # never a false accept.
  matchers:
    # Strong provider-assigned id (e.g. RIDE SASID -> member_external_id via
    # that provider's own column_mappings). Highest precedence.
    - name: deterministic_external_id
      type: deterministic
      keys: [member_external_id]

    - name: deterministic_ssn
      type: deterministic
      keys: [ssn]

    # Standardized name columns (suffixes/prefixes like JR, SR, DR stripped)
    # so exact comparison isn't defeated by formatting differences alone.
    - name: deterministic_name_dob
      type: deterministic
      keys: [first_name_std, last_name_std, birth_date]

    - name: deterministic_name_addr
      type: deterministic
      keys: [first_name_std, last_name_std, address1]

# --- Data-quality rules (evaluated during cleanse; recorded as metrics) ------
dq_rules:
  - { name: ssn_present,       attribute: ssn,        rule: not_null, severity: warn }
  - { name: ssn_format,        attribute: ssn,        rule: regex, pattern: '^\d{9}$', severity: warn }
  - { name: birth_date_present, attribute: birth_date, rule: not_null, severity: warn }
  - { name: last_name_present, attribute: last_name,  rule: not_null, severity: error }
  - { name: state_format,      attribute: state,      rule: length, min_length: 2, max_length: 2, severity: warn }
